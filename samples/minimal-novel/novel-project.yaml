novel:
  title: "Sample Novel"
  genre: "玄幻修仙"
  target_chapters: 1
  words_per_chapter: [800, 1500]
  style: "sample, short"
  seeds:
    - outline/premise.md
    - outline/world.md
  constraints:
    - CLAUDE.md

pipeline:
  stages:
    # --------------------------------------------------------------- #
    # Stage 1: generate a short outline from the seeds.  PR-2 moved
    # the output path from output/summaries/plot.md to the dedicated
    # chapters-outline/ directory.
    # --------------------------------------------------------------- #
    - id: generate_outline
      model: claude-opus-4-7
      prompt: prompts/generate-outline.md
      produces:
        - path: chapters-outline/outline.md
          alias: outline
      done_when:
        max_attempts: 3
        checks:
          - kind: min_chars
            target: chapters-outline/outline.md
            value: 200
          - kind: regex_match
            target: chapters-outline/outline.md
            pattern: "## Chapter"

    # --------------------------------------------------------------- #
    # Stage 2: design character dossiers (PR-2 split-mode).  One
    # markdown file per character; slug is captured from the model's
    # ``# <name>`` heading and must satisfy [A-Za-z0-9_-]+.
    # --------------------------------------------------------------- #
    - id: design_characters
      model: claude-opus-4-7
      prompt: prompts/design-characters.md
      consumes: [generate_outline]
      produces:
        - path: characters/{{slug}}.md
          alias: characters
          split: "^#\\s+(?P<slug>[A-Za-z0-9_-]+)\\s*$"
      done_when:
        max_attempts: 3
        checks:
          - kind: min_chars
            target: characters/{{slug}}.md
            value: 200

    # --------------------------------------------------------------- #
    # Stage 3: write a single chapter that consumes the outline +
    # the split-mode character dossiers via the [*] list reference.
    # Demonstrates consumes: explicit list.
    # --------------------------------------------------------------- #
    - id: write_chapter
      model: claude-opus-4-7
      prompt: prompts/write-chapter.md
      consumes: [generate_outline, design_characters]
      produces:
        - path: output/chapters/001.md
          alias: chapter
      done_when:
        max_attempts: 3
        checks:
          - kind: min_chars
            target: output/chapters/001.md
            value: 400

    # --------------------------------------------------------------- #
    # Stage 4: review the chapter.  Demonstrates consumes: [] (no
    # upstream bindings) + a json_field check.
    # --------------------------------------------------------------- #
    - id: review_chapter
      model: claude-sonnet-4-6
      prompt: prompts/review-chapter.md
      consumes: []
      produces:
        - path: output/review/chapter-review.json
          alias: review
      done_when:
        max_attempts: 2
        checks:
          - kind: json_field
            target: output/review/chapter-review.json
            field: passed

execution:
  batch_size:
    outline: 50
    chapter: 1
  max_review_iterations: 3
  review_model: "claude-sonnet-4-6"
  write_model: "claude-opus-4-7"
